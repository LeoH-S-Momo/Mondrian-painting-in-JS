<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    .container{
      background-color: black;
      height: 748px;
      width:748px;
      display: grid;
      justify-self: center;
      margin: 10vh;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 132px 155px 20px;
      gap: 9px;
      
    }
    .red{
      background-color: #E72F24;
    }
    .white1 {
      background-color:#F0F1EC;
      grid-column: span 3;
    }

    
    .white2 {
      background-color:#F0F1EC;
      grid-row: span 2;
    }
    .white3 {
      background-color:#F0F1EC;
      grid-row: span 2;
      grid-column: span 2;
    }
    .blue {
      background-color: #004592;
      border-bottom: 1px;
    }
    .white4{
      background-color:#F0F1EC;
      grid-row: span 2;
    }
    .white5{
      background-color:#F0F1EC;
    }
    .yellow {
      background-color:#F9D01E;
    }
    .grey {
      background-color:#232629;
    }
   
  </style>
</head>

<body>
     <div class="container">
    <div class="red">   </div>
    <div class="white1"></div>
    <div class="white2"></div>
    <div class="white3"></div>
    <div class="blue"></div>
    <div class="white4"></div>
    <div class="white5"></div>
    <div class="yellow"></div>
    <div class="grey"></div>   
   </div>
   <p>Link to the original Mondrian painting: 
    <a href="https://commons.wikimedia.org/wiki/File:Piet_Mondrian_-_Composition_No._III,
    _with_red,_blue,_yellow_and_black,_1929.jpg">Composition III</a></p>
</body>

</html>
